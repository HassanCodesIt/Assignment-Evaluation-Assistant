<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment Assist | Query</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #818cf8;
            --primary-hover: #6366f1;
            --accent: #c084fc;
            --bg: #030712;
            --glass-bg: rgba(17, 24, 39, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f3f4f6;
            --text-muted: #9ca3af;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(at 0% 100%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(192, 132, 252, 0.15) 0px, transparent 50%);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 650px;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3rem;
            border-radius: 2rem;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #a5b4fc 0%, #d8b4fe 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.75rem;
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select,
        input[type="text"],
        textarea {
            width: 100%;
            padding: 1rem 1.25rem;
            border-radius: 1rem;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.3);
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            appearance: none;
            box-sizing: border-box;
        }

        textarea {
            height: 120px;
            resize: vertical;
        }

        select:focus,
        textarea:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 4px rgba(129, 140, 248, 0.1);
        }

        button {
            width: 100%;
            padding: 1.1rem;
            border-radius: 1rem;
            border: none;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
            margin-top: 0.5rem;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
        }

        #response-container {
            margin-top: 2rem;
            padding: 2rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 1.5rem;
            border: 1px solid var(--glass-border);
            display: none;
            animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #response-text {
            line-height: 1.8;
            color: #e5e7eb;
            font-size: 1.05rem;
            white-space: pre-wrap;
        }

        .loading {
            text-align: center;
            color: var(--primary);
            font-weight: 500;
            display: none;
            margin: 1.5rem 0;
            letter-spacing: 0.5px;
        }

        .link-container {
            margin-top: 2.5rem;
            text-align: center;
        }

        a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        a:hover {
            color: var(--primary);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <h1>Query Assistant</h1>
            <form id="queryForm">
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <select id="subject" name="subject" required>
                        <!-- Populated by JS -->
                    </select>
                </div>
                <div class="form-group">
                    <label for="user_query">Your Question</label>
                    <textarea id="user_query" name="user_query" placeholder="Ask anything about the document..."
                        required></textarea>
                </div>
                <div id="loading" class="loading">Thinking...</div>
                <button type="submit">Get Answer</button>
            </form>
            <div id="response-container">
                <label>Answer:</label>
                <div id="response-text"></div>
            </div>
            <div class="link-container">
                <a href="/">Back to Upload</a>
                <a href="/evaluate">Evaluate</a>
                <a href="/ocr">OCR</a>
                <a href="/assignment">Assignment</a>
            </div>
        </div>
    </div>

    <script>
        function loadSubjects() {
            const select = document.getElementById("subject");
            const currentValue = select.value;
            select.innerHTML = "";

            const defaultSubjects = ["physics", "chemistry"];
            const savedSubjects = JSON.parse(localStorage.getItem("subjects")) || [];
            const allSubjects = [...new Set([...defaultSubjects, ...savedSubjects])];

            const placeholder = document.createElement("option");
            placeholder.value = "";
            placeholder.textContent = "Select a subject...";
            placeholder.disabled = true;
            placeholder.selected = !currentValue;
            select.appendChild(placeholder);

            allSubjects.forEach(sub => {
                const option = document.createElement("option");
                option.value = sub.toLowerCase();
                option.textContent = sub.charAt(0).toUpperCase() + sub.slice(1);
                if (sub.toLowerCase() === currentValue) option.selected = true;
                select.appendChild(option);
            });
        }

        window.addEventListener('load', loadSubjects);

        document.getElementById('queryForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const subject = document.getElementById("subject").value;
            const user_query = document.getElementById("user_query").value;

            if (!subject) {
                alert("Please select a subject!");
                return;
            }

            const formData = new FormData();
            formData.append("subject", subject);
            formData.append("user_query", user_query);

            const responseContainer = document.getElementById('response-container');
            const responseText = document.getElementById('response-text');
            const loading = document.getElementById('loading');

            responseContainer.style.display = 'none';
            loading.style.display = 'block';

            try {
                const response = await fetch('/query', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                responseText.textContent = result.response;
                loading.style.display = 'none';
                responseContainer.style.display = 'block';
            } catch (error) {
                console.error('Error:', error);
                loading.style.display = 'none';
            }
        });
    </script>
</body>

</html>
