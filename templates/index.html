<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment Assist | Upload</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #818cf8;
            --primary-hover: #6366f1;
            --accent: #c084fc;
            --bg: #030712;
            --glass-bg: rgba(17, 24, 39, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f3f4f6;
            --text-muted: #9ca3af;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(192, 132, 252, 0.15) 0px, transparent 50%);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3rem;
            border-radius: 2rem;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #a5b4fc 0%, #d8b4fe 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            font-weight: 300;
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.75rem;
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select,
        input[type="text"],
        input[type="file"] {
            width: 100%;
            padding: 0.85rem 1rem;
            border-radius: 0.75rem;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.3);
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }

        input[type="file"] {
            padding: 0.6rem;
            cursor: pointer;
        }

        select:focus,
        input[type="text"]:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 4px rgba(129, 140, 248, 0.1);
        }

        button {
            width: 100%;
            padding: 1rem;
            border-radius: 0.75rem;
            border: none;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .nav-links {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 1.25rem;
            flex-wrap: wrap;
        }

        a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s;
            position: relative;
        }

        a:hover {
            color: var(--primary);
        }

        #message {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 0.75rem;
            display: none;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success {
            background-color: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            background: var(--text-muted);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <h1>Upload</h1>
            <p>Process documents for AI evaluation.</p>
            <form id="uploadForm">
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <select id="subject" name="subject" required onchange="toggleCustomSubject(this)">
                        <!-- Populated by JS -->
                    </select>
                </div>
                <div id="custom-subject-container" class="form-group" style="display:none;">
                    <label for="custom-subject">New Subject</label>
                    <input type="text" id="custom-subject" placeholder="e.g. Quantum Physics">
                </div>
                <div class="form-group">
                    <label for="file">Source PDF(s)</label>
                    <input type="file" id="file" name="file" accept=".pdf" multiple required>
                </div>
                <button type="submit" id="uploadBtn">
                    <span id="btnText">Upload & Process</span>
                </button>
            </form>
            <div id="message"></div>
            <div class="nav-links">
                <a href="/query">Query</a>
                <a href="/evaluate">Evaluate</a>
                <a href="/ocr">OCR</a>
                <a href="/assignment">Assignment</a>
            </div>
        </div>
    </div>
</body>

<script>
    function loadSubjects() {
        const select = document.getElementById("subject");
        const currentValue = select.value;
        select.innerHTML = "";

        const defaultSubjects = ["physics", "chemistry"];
        const savedSubjects = JSON.parse(localStorage.getItem("subjects")) || [];
        const allSubjects = [...new Set([...defaultSubjects, ...savedSubjects])];

        const placeholder = document.createElement("option");
        placeholder.value = "";
        placeholder.textContent = "Select a subject...";
        placeholder.disabled = true;
        placeholder.selected = !currentValue;
        select.appendChild(placeholder);

        allSubjects.forEach(sub => {
            const option = document.createElement("option");
            option.value = sub.toLowerCase();
            option.textContent = sub.charAt(0).toUpperCase() + sub.slice(1);
            if (sub.toLowerCase() === currentValue) option.selected = true;
            select.appendChild(option);
        });

        const customOption = document.createElement("option");
        customOption.value = "custom";
        customOption.textContent = "+ Add New Subject";
        select.appendChild(customOption);
    }

    function toggleCustomSubject(selectElement) {
        const customContainer = document.getElementById("custom-subject-container");
        customContainer.style.display = (selectElement.value === "custom") ? "block" : "none";
        if (selectElement.value === "custom") {
            document.getElementById("custom-subject").focus();
        }
    }

    window.addEventListener('load', loadSubjects);

    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const selectElement = document.getElementById("subject");
        let subject = selectElement.value;
        const customInput = document.getElementById("custom-subject");
        const uploadBtn = document.getElementById("uploadBtn");
        const btnText = document.getElementById("btnText");

        if (subject === "custom") {
            subject = customInput.value.trim();
            if (!subject) {
                alert("Please enter a custom subject name!");
                return;
            }

            const savedSubjects = JSON.parse(localStorage.getItem("subjects")) || [];
            if (!savedSubjects.includes(subject.toLowerCase())) {
                savedSubjects.push(subject.toLowerCase());
                localStorage.setItem("subjects", JSON.stringify(savedSubjects));
            }

            loadSubjects();
            selectElement.value = subject.toLowerCase();
            customInput.value = "";
            document.getElementById("custom-subject-container").style.display = "none";
        }

        if (!subject) {
            alert("Please select a subject!");
            return;
        }

        const formData = new FormData();
        formData.append("subject", subject);
        const fileInput = document.getElementById('file');
        for (let i = 0; i < fileInput.files.length; i++) {
            formData.append("files", fileInput.files[i]);
        }

        const messageDiv = document.getElementById('message');
        messageDiv.style.display = 'none';

        // Show loading state
        uploadBtn.disabled = true;
        btnText.innerHTML = '<span class="spinner"></span> Processing...';

        try {
            const response = await fetch('/upload', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            messageDiv.className = 'success';
            messageDiv.textContent = result.message + " for " + result.subject;
            messageDiv.style.display = 'block';
        } catch (error) {
            console.error('Error:', error);
            alert("Upload failed. Please check your connection.");
        } finally {
            // Reset button state
            uploadBtn.disabled = false;
            btnText.textContent = "Upload & Process";
        }
    });
</script>
</body>

</html>
